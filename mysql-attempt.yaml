apiVersion: v1
kind: Pod
metadata:
  name: mysql-attempt
  namespace: backbase
spec:
  containers:
  - name: mysql-client
    image: alpine:latest
    command: ["/bin/sh"]
    args:
    - -c
    - |
      apk add --update mariadb-client openssl
      
      echo "=== LISTING CERT FILES ==="
      ls -la /etc/database-certs/
      
      echo "=== LISTING KEYSTORE PASSWORD FILES ==="
      ls -la /etc/db-certificate-store/
      
      KEYSTORE_PASS=$(cat /etc/db-certificate-store/keystore-password)
      echo "=== KEYSTORE PASSWORD LENGTH: ${#KEYSTORE_PASS} ==="
      
      echo "=== EXTRACTING CERTIFICATES FROM P12 ==="
      openssl pkcs12 -in /etc/database-certs/client-keystore.p12 -out /tmp/client.crt -clcerts -nokeys -password pass:$KEYSTORE_PASS
      openssl pkcs12 -in /etc/database-certs/client-keystore.p12 -out /tmp/client.key -nocerts -nodes -password pass:$KEYSTORE_PASS
      
      echo "=== EXTRACTED CERT FILES ==="
      ls -la /tmp/client.crt /tmp/client.key
      
      echo "=== TRYING MYSQL CONNECTION WITH EXTRACTED CERTS ==="
      mysql -h 10.236.200.6 -u bm-atlas-backbase-prd \
        --ssl-ca=/etc/database-certs/ \
        --ssl-cert=/tmp/client.crt \
        --ssl-key=/tmp/client.key \
        -e "SHOW DATABASES;"
      
      echo "=== MYSQL CONNECTION ATTEMPT FINISHED ==="
      sleep 3600
    volumeMounts:
    - name: database-certs
      mountPath: /etc/database-certs
    - name: db-certificate-store
      mountPath: /etc/db-certificate-store
  volumes:
  - name: database-certs
    secret:
      secretName: database-certs
  - name: db-certificate-store
    secret:
      secretName: db-certificate-store
  restartPolicy: Never
