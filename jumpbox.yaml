apiVersion: v1
kind: Pod
metadata:
  name: jumpbox
  namespace: backbase
spec:
  containers:
  - name: alpine
    image: alpine:latest
    command: ["/bin/sh"]
    args: ["-c", "sleep 3600"]
    volumeMounts:
    - name: database-certs
      mountPath: /etc/database-certs
    - name: db-certificate-store
      mountPath: /etc/db-certificate-store
  volumes:
  - name: database-certs
    secret:
      secretName: database-certs
  - name: db-certificate-store
    secret:
      secretName: db-certificate-store
  restartPolicy: Never
